services:
  # ── Web Service (Django API via Gunicorn) ──────────────────────────
  - type: web
    name: payout-engine-api
    runtime: python
    rootDir: backend
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py seed_data &&
      python manage.py setup_schedules
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: USE_SQLITE
        value: "0"
      - key: DB_NAME
        fromDatabase:
          name: payout-engine-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: payout-engine-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: payout-engine-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: payout-engine-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: payout-engine-db
          property: port
      - key: CORS_ALLOWED_ORIGIN
        value: ""  # Set to your Vercel URL after frontend deploys

  # ── Background Worker (Django-Q qcluster) ─────────────────────────
  - type: worker
    name: payout-engine-worker
    runtime: python
    rootDir: backend
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput
    startCommand: python manage.py qcluster
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        fromService:
          name: payout-engine-api
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: USE_SQLITE
        value: "0"
      - key: DB_NAME
        fromDatabase:
          name: payout-engine-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: payout-engine-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: payout-engine-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: payout-engine-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: payout-engine-db
          property: port

# ── PostgreSQL Database ──────────────────────────────────────────────
databases:
  - name: payout-engine-db
    databaseName: payout_engine
    user: payout_user
    plan: free
